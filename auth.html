<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خبير | بوابة تسجيل الدخول الموحدة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght=300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.65); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-gold { background: rgba(245, 158, 11, 0.1); backdrop-filter: blur(12px); border: 1px solid rgba(245, 158, 11, 0.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-4 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">

    <a href="index.html" class="absolute top-6 right-6 text-sm text-slate-400 hover:text-amber-400 transition flex items-center gap-1 font-bold">
        ← العودة للرئيسية
    </a>

    <div class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl space-y-6 border border-slate-800/80">
        
        <div class="text-center">
            <h1 class="text-3xl font-black text-amber-500 tracking-wider mb-2">خبير | Khabeer</h1>
            <p id="formSubtitle" class="text-xs text-slate-400 font-medium">أهلاً بك، الرجاء تسجيل الدخول لمتابعة خدماتك</p>
        </div>

        <div class="grid grid-cols-2 bg-slate-950/60 p-1.5 rounded-xl border border-slate-800 text-center text-sm font-bold">
            <button id="toggleLoginBtn" onclick="switchForm('login')" class="py-2.5 rounded-lg bg-amber-500 text-slate-950 shadow transition duration-300">تسجيل الدخول</button>
            <button id="toggleRegisterBtn" onclick="switchForm('register')" class="py-2.5 rounded-lg text-slate-400 hover:text-white transition duration-300">حساب جديد</button>
        </div>

        <form id="authForm" onsubmit="handleAuth(event)" class="space-y-4">
            
            <div id="nameField" class="hidden space-y-1">
                <label class="text-xs text-slate-400 font-bold block">الاسم الكامل</label>
                <input type="text" id="fullName" class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-amber-500/50 transition" placeholder="اسمك الثلاثي">
            </div>

            <div class="space-y-1">
                <label class="text-xs text-slate-400 font-bold block">البريد الإلكتروني</label>
                <input type="email" id="email" required class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-amber-500/50 transition text-left font-mono" placeholder="name@example.com">
            </div>

            <div class="space-y-1">
                <label class="text-xs text-slate-400 font-bold block">كلمة المرور</label>
                <input type="password" id="password" required minlength="6" class="w-full bg-slate-950/50 border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-amber-500/50 transition text-left" placeholder="••••••••">
            </div>

            <div id="roleField" class="hidden space-y-2 pt-2">
                <label class="text-xs text-slate-400 font-bold block">نوع الحساب المراد إنشاؤه:</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="border border-slate-800 bg-slate-950/30 p-3 rounded-xl flex items-center justify-center gap-2 cursor-pointer hover:border-amber-500/30 transition">
                        <input type="radio" name="userRole" value="customer" checked class="accent-amber-500">
                        <span class="text-xs font-bold text-slate-300">زبون 👤</span>
                    </label>
                    <label class="border border-slate-800 bg-slate-950/30 p-3 rounded-xl flex items-center justify-center gap-2 cursor-pointer hover:border-amber-500/30 transition">
                        <input type="radio" name="userRole" value="technician" class="accent-amber-500">
                        <span class="text-xs font-bold text-slate-300">فني صيانة 🔧</span>
                    </label>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-slate-950 font-black py-3.5 rounded-xl text-sm transition transform active:scale-[0.98] shadow-lg mt-4 disabled:opacity-50 disabled:cursor-not-allowed">
                تسجيل الدخول 🚀
            </button>
        </form>

        <div id="alertMsg" class="hidden text-center text-xs p-3 rounded-xl font-bold"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://nzwhrbaxhygivduwmria.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_-0A6mi2LDboRsW2MYRBb1A_I5q1Jikw"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentMode = 'login'; 

        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session && session.user) {
                const userRole = session.user.user_metadata.role || 'customer';
                redirectUser(userRole);
            }
        });

        function switchForm(mode) {
            currentMode = mode;
            const nameField = document.getElementById('nameField');
            const roleField = document.getElementById('roleField');
            const submitBtn = document.getElementById('submitBtn');
            const formSubtitle = document.getElementById('formSubtitle');
            
            const toggleLoginBtn = document.getElementById('toggleLoginBtn');
            const toggleRegisterBtn = document.getElementById('toggleRegisterBtn');

            hideAlert();

            if (mode === 'register') {
                nameField.classList.remove('hidden');
                roleField.classList.remove('hidden');
                formSubtitle.innerText = "انضم إلينا اليوم واستمتع بتجربة صيانة استثنائية";
                submitBtn.innerText = "إنشاء الحساب الجديد ✨";
                
                toggleRegisterBtn.className = "py-2.5 rounded-lg bg-amber-500 text-slate-950 shadow font-bold transition duration-300";
                toggleLoginBtn.className = "py-2.5 rounded-lg text-slate-400 hover:text-white font-bold transition duration-300";
            } else {
                nameField.classList.add('hidden');
                roleField.classList.add('hidden');
                formSubtitle.innerText = "أهلاً بك، الرجاء تسجيل الدخول لمتابعة خدماتك";
                submitBtn.innerText = "تسجيل الدخول 🚀";
                
                toggleLoginBtn.className = "py-2.5 rounded-lg bg-amber-500 text-slate-950 shadow font-bold transition duration-300";
                toggleRegisterBtn.className = "py-2.5 rounded-lg text-slate-400 hover:text-white font-bold transition duration-300";
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            hideAlert();

            const submitBtn = document.getElementById('submitBtn');
            const originalBtnText = submitBtn.innerText;

            // ⚡ تفعيل حالة التحميل وقفل الزر
            submitBtn.disabled = true;
            submitBtn.innerText = "جاري التحقق... ⏳";

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value.trim();
            const role = document.querySelector('input[name="userRole"]:checked').value;

            if (currentMode === 'register') {
                if(!fullName) {
                    showAlert('الرجاء إدخال اسمك الكامل أولاً', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerText = originalBtnText;
                    return;
                }
                
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            role: role
                        }
                    }
                });

                if (error) {
                    showAlert(error.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerText = originalBtnText;
                } else {
                    showAlert('تم إنشاء الحساب بنجاح! جاري توجيهك...', 'success');
                    setTimeout(() => redirectUser(role), 1500);
                }

            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    showAlert('خطأ في البريد الإلكتروني أو كلمة المرور', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerText = originalBtnText;
                } else {
                    const userRole = data.user.user_metadata.role || 'customer';
                    showAlert('تم تسجيل الدخول بنجاح! مرحباً بك', 'success');
                    setTimeout(() => redirectUser(userRole), 1500);
                }
            }
        }

        function redirectUser(role) {
            if (role === 'technician') {
                window.location.href = 'tech.html';
            } else {
                window.location.href = 'request.html'; 
            }
        }

        function showAlert(msg, type) {
            const alert = document.getElementById('alertMsg');
            alert.innerText = msg;
            alert.classList.remove('hidden', 'bg-red-500/20', 'text-red-400', 'bg-emerald-500/20', 'text-emerald-400');
            
            if (type === 'error') {
                alert.classList.add('bg-red-500/20', 'text-red-400');
            } else {
                alert.classList.add('bg-emerald-500/20', 'text-emerald-400');
            }
        }

        function hideAlert() {
            document.getElementById('alertMsg').classList.add('hidden');
        }
    </script>
</body>
</html>
