<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الفني | خبير</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- شريط التنقل المعدل ليتناسب مع الهواتف -->
    <nav class="glass sticky top-0 z-50 px-4 py-4 flex flex-col md:flex-row justify-between items-center shadow-lg gap-4">
        <div class="flex items-center gap-3">
            <span class="text-2xl font-black text-amber-500">خبير | Khabeer</span>
            <span class="text-xs bg-amber-500/20 text-amber-400 px-2.5 py-1 rounded-full font-bold">بوابة الفني 🔧</span>
        </div>
        <div class="flex flex-wrap justify-center gap-3 md:gap-6 items-center text-xs md:text-sm font-medium">
            <a href="index.html" class="hover:text-amber-400 transition">الرئيسية</a>
            <a href="request.html" class="hover:text-amber-400 transition">طلب خدمة</a>
            <a href="tech.html" class="text-amber-400 hover:text-amber-300 transition border border-amber-500/30 px-3 py-1 rounded-lg">لوحة الفني</a>
            <span class="bg-emerald-500/20 text-emerald-400 font-bold px-3 py-1.5 rounded-lg text-[10px] md:text-xs">أحمد (متصل)</span>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 md:py-12 max-w-2xl space-y-8">
        <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 space-y-2">
            <h1 class="text-2xl font-black">قائمة المهام اليومية 📋</h1>
            <p class="text-xs text-slate-400">يتم جلب طلبات العمل مباشرة من السيرفر السحابي حياً ومباشرة.</p>
        </div>

        <div id="tech-tasks-container" class="space-y-6">
            <div id="loading-msg" class="text-center py-10 text-slate-400 animate-pulse">
                جاري الاتصال بقاعدة البيانات السحابية وجلب المهام... ⏳
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://nzwhrbaxhygivduwmria.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_-0A6mi2LDboRsW2MYRBb1A_I5q1Jikw"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.addEventListener('DOMContentLoaded', fetchActiveOrders);

        async function fetchActiveOrders() {
            const container = document.getElementById('tech-tasks-container');
            
            try {
                const { data: orders, error } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .order('id', { ascending: false })
                    .limit(10);

                if (error) throw error;

                if (!orders || orders.length === 0) {
                    container.innerHTML = `
                        <div class="glass p-8 text-center rounded-2xl border border-slate-800 text-slate-400 italic">
                            📭 لا توجد مهام أو طلبات مسجلة حالياً في قاعدة البيانات.
                        </div>`;
                    return;
                }

                container.innerHTML = "";

                orders.forEach(order => {
                    const orderCard = document.createElement('div');
                    orderCard.className = "glass p-4 md:p-6 rounded-2xl border-2 border-slate-800 space-y-4 hover:border-amber-500/30 transition duration-300";
                    
                    let statusBadge = `<span class="bg-amber-500 text-slate-950 font-bold text-[10px] px-2.5 py-1 rounded-full">قيد الانتظار ⏳</span>`;
                    if (order.status === 'on_the_way') {
                        statusBadge = `<span class="bg-blue-500 text-white font-bold text-[10px] px-2.5 py-1 rounded-full">في الطريق 🚗</span>`;
                    } else if (order.status === 'arrived') {
                        statusBadge = `<span class="bg-emerald-500 text-slate-950 font-bold text-[10px] px-2.5 py-1 rounded-full">وصل الموقع 📍</span>`;
                    } else if (order.status === 'completed') {
                        statusBadge = `<span class="bg-slate-700 text-slate-300 font-bold text-[10px] px-2.5 py-1 rounded-full">مكتمل ✓</span>`;
                    }

                    let imageSection = `<p class="text-xs text-slate-500 italic py-1">لم يقم العميل بإرفاق أي صورة لهذا الطلب.</p>`;
                    if (order.image_url) {
                        imageSection = `
                            <div class="relative overflow-hidden rounded-lg border border-slate-800 bg-slate-900">
                                <img src="${order.image_url}" alt="صورة العطل" class="w-full max-h-60 object-cover">
                            </div>
                            <a href="${order.image_url}" target="_blank" class="block text-center text-xs text-amber-500 hover:text-amber-400 hover:underline">
                                🔍 فتح الصورة بحجمها الكامل
                            </a>
                        `;
                    }

                    orderCard.innerHTML = `
                        <div class="flex justify-between items-center">
                            ${statusBadge}
                            <span class="text-xs text-slate-400">طلب رقم: #KH-${order.id}</span>
                        </div>
                        <hr class="border-slate-800">
                        <div class="space-y-2 text-sm">
                            <p>• <strong>نوع الخدمة:</strong> ${order.service_type}</p>
                            <p>• <strong>العنوان:</strong> ${order.manual_address}</p>
                            <p>• <strong>وصف العطل:</strong> ${order.problem_desc}</p>
                        </div>
                        <div class="border border-slate-800 bg-slate-950/40 p-3 md:p-4 rounded-xl space-y-2">
                            <p class="text-xs font-bold text-amber-400 flex items-center gap-1.5">📷 صورة العطل المرفقة:</p>
                            ${imageSection}
                        </div>
                        <div class="grid grid-cols-2 gap-2 pt-2">
                            <a href="${order.gps_coords}" target="_blank" class="col-span-2 bg-slate-800 hover:bg-slate-700 text-amber-400 py-3 text-sm font-bold rounded-xl text-center flex items-center justify-center gap-1">📍 فتح موقع العميل (GPS)</a>
                        </div>
                        <hr class="border-slate-800">
                        <div class="space-y-3">
                            <p class="text-xs font-bold text-slate-300">تحديث حالة المهمة:</p>
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="updateStatus(${order.id}, 'on_the_way')" class="bg-slate-800 hover:bg-amber-500 hover:text-slate-950 text-slate-300 text-[10px] md:text-xs font-bold py-2 rounded-lg transition">في الطريق 🚗</button>
                                <button onclick="updateStatus(${order.id}, 'arrived')" class="bg-slate-800 hover:bg-emerald-500 hover:text-slate-950 text-slate-300 text-[10px] md:text-xs font-bold py-2 rounded-lg transition">وصلت 📍</button>
                                <button onclick="updateStatus(${order.id}, 'completed')" class="bg-slate-800 hover:bg-blue-600 hover:text-white text-slate-300 text-[10px] md:text-xs font-bold py-2 rounded-lg transition">اكتمل العمل ✓</button>
                            </div>
                        </div>
                    `;

                    container.appendChild(orderCard);
                });

            } catch (error) {
                console.error("خطأ:", error);
                container.innerHTML = `<div class="glass p-8 text-center rounded-2xl border border-red-500/20 text-red-400">⚠️ فشل جلب البيانات من السيرفر.</div>`;
            }
        }

        async function updateStatus(orderId, newState) {
            try {
                const { error } = await supabaseClient.from('orders').update({ status: newState }).eq('id', orderId);
                if (error) throw error;
                fetchActiveOrders(); 
            } catch (error) {
                alert("فشل التحديث في السيرفر السحابي.");
            }
        }
    </script>
</body>
</html>
