<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الفني | استقبال الطلبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- شريط التنقل المحدث -->
    <nav class="glass sticky top-0 z-50 px-4 py-4 flex flex-col sm:flex-row justify-between items-center shadow-lg gap-4 bg-slate-900/80 border-b border-slate-800">
        <div class="flex items-center justify-between w-full sm:w-auto px-2">
            <span class="text-2xl font-black text-amber-500">خبير | Khabeer</span>
        </div>
        <div class="flex flex-wrap justify-center gap-3 md:gap-5 items-center text-xs md:text-sm font-medium w-full sm:w-auto">
            <a href="index.html" class="hover:text-amber-400 transition">الرئيسية</a>
            <a href="pricing.html" class="hover:text-amber-400 transition">الباقات والاشتراكات</a>
            <a href="request.html" class="hover:text-amber-400 transition">طلب خدمة</a>
            <a href="#" class="hover:text-amber-400 transition border border-amber-500/30 px-3 py-1.5 rounded-md bg-amber-500/10">الزبون 👤</a>
            <a href="tech.html" class="text-amber-400 transition border border-slate-700 px-3 py-1.5 rounded-md bg-slate-800/50">الفني 🔧</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-4xl flex-grow">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black flex items-center gap-2">
                <span class="text-amber-500">الرادار الحي</span> 📡
            </h1>
            <div class="flex items-center gap-2 text-sm bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-full border border-emerald-500/30">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span> متصل بالسحابة
            </div>
        </div>

        <div id="ordersContainer" class="grid gap-6 sm:grid-cols-2">
            <p id="noOrdersMsg" class="col-span-full text-center text-slate-500 py-10 glass rounded-2xl">جاري البحث عن طلبات جديدة في منطقتك...</p>
        </div>
    </main>

    <!-- مودال لتكبير الصورة للفني -->
    <div id="imageModal" class="hidden fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4">
        <button onclick="closeImageModal()" class="absolute top-6 right-6 text-white text-3xl font-bold bg-slate-800/85 w-12 h-12 rounded-full flex items-center justify-center hover:bg-slate-700 transition">&times;</button>
        <img id="modalImg" src="" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl">
    </div>

    <script>
        const SUPABASE_URL = "https://nzwhrbaxhygivduwmria.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_-0A6mi2LDboRsW2MYRBb1A_I5q1Jikw"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let activeOrders = [];

        async function fetchPendingOrders() {
            const { data, error } = await supabaseClient
                .from('orders')
                .select('*')
                .in('status', ['pending', 'on_the_way_30', 'on_the_way_60', 'on_the_way_90', 'arrived'])
                .order('created_at', { ascending: false });

            if (!error) {
                activeOrders = data;
                renderOrders();
            }
        }

        // الاستماع للتغييرات الحية
        supabaseClient.channel('tech-radar').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, payload => {
            fetchPendingOrders(); // إعادة جلب الطلبات عند أي تغيير لضمان الدقة
        }).subscribe();

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            const noOrdersMsg = document.getElementById('noOrdersMsg');
            
            container.innerHTML = '';
            
            if (activeOrders.length === 0) {
                container.appendChild(noOrdersMsg);
                noOrdersMsg.classList.remove('hidden');
                return;
            }

            activeOrders.forEach(order => {
                const card = document.createElement('div');
                card.className = "glass p-5 rounded-2xl border border-slate-700 shadow-xl space-y-4 relative overflow-hidden";
                
                // شريط الحالة
                let statusBadge = '';
                if(order.status === 'pending') statusBadge = '<span class="bg-amber-500/20 text-amber-400 text-xs px-2 py-1 rounded border border-amber-500/30">جديد</span>';
                else if(order.status.includes('on_the_way')) statusBadge = '<span class="bg-blue-500/20 text-blue-400 text-xs px-2 py-1 rounded border border-blue-500/30">في الطريق</span>';
                else if(order.status === 'arrived') statusBadge = '<span class="bg-emerald-500/20 text-emerald-400 text-xs px-2 py-1 rounded border border-emerald-500/30">تم الوصول</span>';

                // معالجة الصورة مع ميزة التكبير
                let imageHtml = '';
                if(order.image_url) {
                    imageHtml = `
                        <div class="mt-3 relative">
                            <img src="${order.image_url}" onclick="openImageModal('${order.image_url}')" class="w-full h-32 object-cover rounded-xl border border-slate-600 cursor-pointer hover:opacity-80 transition" title="اضغط لتكبير الصورة">
                            <span class="absolute bottom-2 left-2 bg-black/60 text-white text-[10px] px-2 py-1 rounded backdrop-blur-sm">🔍 تكبير</span>
                        </div>
                    `;
                }

                // أزرار التحكم حسب الحالة
                let actionButtons = '';
                if(order.status === 'pending') {
                    actionButtons = `
                        <div class="space-y-2 mt-4">
                            <p class="text-xs text-slate-400 font-bold mb-1">تحديد وقت الوصول المتوقع:</p>
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="updateOrderStatus(${order.id}, 'on_the_way_30')" class="bg-blue-600 hover:bg-blue-500 text-white text-xs py-2 rounded-lg font-bold transition">30 دقيقة</button>
                                <button onclick="updateOrderStatus(${order.id}, 'on_the_way_60')" class="bg-blue-700 hover:bg-blue-600 text-white text-xs py-2 rounded-lg font-bold transition">ساعة</button>
                                <button onclick="updateOrderStatus(${order.id}, 'on_the_way_90')" class="bg-blue-800 hover:bg-blue-700 text-white text-xs py-2 rounded-lg font-bold transition">ساعة ونصف</button>
                            </div>
                        </div>
                    `;
                } else if (order.status.includes('on_the_way')) {
                    actionButtons = `<button onclick="updateOrderStatus(${order.id}, 'arrived')" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 mt-4 rounded-xl font-bold transition">📍 إبلاغ العميل بالوصول للموقع</button>`;
                } else if (order.status === 'arrived') {
                    actionButtons = `<button onclick="updateOrderStatus(${order.id}, 'completed')" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 py-3 mt-4 rounded-xl font-black transition">✅ إنهاء المهمة بنجاح</button>`;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="text-xs text-slate-500 font-mono">#KH-${order.id}</span>
                        ${statusBadge}
                    </div>
                    <div class="space-y-1">
                        <h3 class="font-black text-lg text-slate-200">${order.service_type}</h3>
                        <p class="text-sm text-slate-400">${order.problem_desc}</p>
                    </div>
                    ${imageHtml}
                    <div class="bg-slate-950/50 p-3 rounded-xl border border-slate-800 text-sm space-y-2">
                        <p><span class="text-amber-500 font-bold">العنوان:</span> ${order.manual_address}</p>
                        <a href="${order.gps_coords}" target="_blank" class="inline-block text-blue-400 hover:text-blue-300 text-xs font-bold mt-1">🗺️ فتح الـ GPS في خرائط جوجل</a>
                    </div>
                    ${actionButtons}
                `;
                container.appendChild(card);
            });
        }

        async function updateOrderStatus(orderId, newStatus) {
            await supabaseClient.from('orders').update({ status: newStatus }).eq('id', orderId);
        }

        // وظائف نافذة تكبير الصورة للفني
        function openImageModal(src) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            modalImg.src = src;
            modal.classList.remove('hidden');
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.add('hidden');
        }

        // جلب البيانات عند بدء التشغيل
        fetchPendingOrders();
    </script>
</body>
</html>
